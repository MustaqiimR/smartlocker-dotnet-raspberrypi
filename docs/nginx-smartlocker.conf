# SmartLocker Nginx Reverse Proxy Configuration
# 
# This configuration sets up Nginx as a reverse proxy for the SmartLocker
# ASP.NET Core application running on Kestrel (localhost:5000).
#
# Installation:
# 1. Copy this file to /etc/nginx/sites-available/smartlocker
# 2. Create symlink: sudo ln -s /etc/nginx/sites-available/smartlocker /etc/nginx/sites-enabled/
# 3. Test config: sudo nginx -t
# 4. Reload Nginx: sudo systemctl reload nginx
#
# Note: This is optional for MVP. The application can run directly on port 5000.

upstream smartlocker_backend {
    server localhost:5000;
    keepalive 64;
}

# Redirect HTTP to HTTPS (optional, uncomment if using SSL)
# server {
#     listen 80;
#     server_name smartlocker.local smartlocker;
#     return 301 https://$server_name$request_uri;
# }

# Main server block
server {
    listen 80;
    server_name smartlocker.local smartlocker localhost;

    # Logging
    access_log /var/log/nginx/smartlocker-access.log;
    error_log /var/log/nginx/smartlocker-error.log;

    # Client body size limit
    client_max_body_size 10M;

    # Root location - proxy to Kestrel
    location / {
        proxy_pass http://smartlocker_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://smartlocker_backend;
        access_log off;
    }

    # Static files caching (if any)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://smartlocker_backend;
        proxy_cache_valid 200 1d;
        proxy_cache_bypass $http_pragma $http_authorization;
        add_header Cache-Control "public, max-age=86400";
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

