<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLocker System - Title Slide</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }
        .left-section {
            flex: 1;
            padding: 80px 60px;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .main-title {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 40px;
            color: #EA580C;
            line-height: 1.4;
        }
        .divider {
            width: 60px;
            height: 4px;
            background: #EA580C;
            margin-bottom: 40px;
        }
        .right-section {
            flex: 1;
            background: #EA580C;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            text-align: center;
        }
        .joint-venture {
            color: #1E293B;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .partners {
            color: #FFFFFF;
            font-size: 24px;
            font-weight: 400;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        .partner-name {
            font-weight: 700;
            font-size: 26px;
            margin: 15px 0;
        }
        .date {
            color: #1E293B;
            font-size: 20px;
            font-weight: 700;
            margin-top: 40px;
        }
        .badge {
            display: inline-block;
            background: #1E293B;
            color: #EA580C;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="left-section">
            <div class="main-title">SmartLocker</div>
            <div class="subtitle">System</div>
            <div class="divider"></div>
            <div style="font-size: 18px; color: #FFFFFF; line-height: 1.6;">
                .NET on Linux Raspberry Pi<br>
                On-Premise Kiosk Application
            </div>
        </div>
        <div class="right-section">
            <div class="joint-venture">Research Project</div>
            <div class="partners">
                Joint Venture Between
            </div>
            <div class="partner-name">ISense ASV Sdn Bhd</div>
            <div style="color: #FFFFFF; font-size: 16px; margin: 10px 0;">and</div>
            <div class="partner-name">UKM FTSM</div>
            <div class="date">July 2026</div>
            <div class="badge">v1.0.0 - Final Release</div>
        </div>
    </div>
</body>
</html>
